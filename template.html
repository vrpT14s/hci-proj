<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://unpkg.com/split.js/dist/split.min.js"></script>
    <script src="app.js"></script>

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        #container {
            display: flex;
            height: 100%;
            width: 100%;
        }

        #gdb_panel, #right {
            height: 100%;
            overflow: auto;
        }

        #right {
            display: flex;
            flex-direction: column;
        }

        #flamegraph, #callgraph {
            overflow: auto;
        }

        /* Prevent flex overflow bugs when collapsing */
        #flamegraph, #callgraph, #gdb_panel {
            min-width: 0;
            min-height: 0;
        }

        /* Split gutters */
        .gutter {
            background: #ddd;
            background-clip: padding-box;
        }

        .gutter.gutter-horizontal {
            cursor: ew-resize;
            width: 6px;
        }

        .gutter.gutter-vertical {
            cursor: ns-resize;
            height: 6px;
        }

        #gdb_panel {
            font-family: monospace;
            white-space: pre;
            padding: 4px;
        }
    </style>
</head>
<body>

<div id="container">
    <!-- LEFT: debugger -->
    <div id="gdb_panel">
(gdb output here)
    </div>

    <!-- RIGHT: flamegraph + callgraph -->
    <div id="right">
        <div id="flamegraph">
            {$svg}
        </div>
        <div id="callgraph">
(callgraph here)
        </div>
    </div>
</div>

<script>
    // Initialize splits
    const mainSplit = Split(['#gdb_panel', '#right'], {
        sizes: [30, 70],
        minSize: 100,
        gutterSize: 6
    });

    const rightSplit = Split(['#flamegraph', '#callgraph'], {
        direction: 'vertical',
        sizes: [60, 40],
        minSize: 100,
        gutterSize: 6
    });

    // Fullscreen state
    let currentFullscreen = null;

    const defaultMainSizes = [30, 70];
    const defaultRightSizes = [60, 40];

    function toggleGutters(show) {
        document.querySelectorAll('.gutter').forEach(g => {
            g.style.display = show ? 'block' : 'none';
        });
    }

    function setFullscreen(target) {
        if (currentFullscreen === target) {
            // Restore layout
            mainSplit.setSizes(defaultMainSizes);
            rightSplit.setSizes(defaultRightSizes);
            currentFullscreen = null;
            //toggleGutters(true);
            return;
        }

        currentFullscreen = target;
        //toggleGutters(false);

        if (target === 'flamegraph') {
            mainSplit.setSizes([0, 100]);
            rightSplit.setSizes([100, 0]);
        }
        else if (target === 'callgraph') {
            mainSplit.setSizes([0, 100]);
            rightSplit.setSizes([0, 100]);
        }
        else if (target === 'gdb') {
            mainSplit.setSizes([100, 0]);
        }
    }

    // Keybindings
    document.addEventListener('keydown', (e) => {
        // Ignore typing in inputs
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

        if (e.key === 'f') {
            setFullscreen('flamegraph');
        } else if (e.key === 'c') {
            setFullscreen('callgraph');
        } else if (e.key === 'd') {
            setFullscreen('gdb');
        }
    });
</script>

</body>
</html>
